<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UHL IOC Check Arrest Bleep Status</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="mobile-web-app-capable" content="yes">

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 20px;
    max-width: 400px;
    margin: auto;
    background-color: #f8f9fa;
    color: #333;
    display: flex;
    flex-direction: column;
    min-height: 90vh;
  }
  .content { flex: 1; }
  
  #date-display h3 {
    margin-top: 0;
    margin-bottom: 20px;
    color: #495057;
  }

  h2 { margin-bottom: 15px; font-size: 1.3em;}

  /* Side-by-side Columns Styling */
  .bleep-row {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }
  .shift-col {
    flex: 1;
    background-color: #e2e3e5;
    border: 1px solid #d6d8db;
    border-radius: 6px;
    padding: 10px;
    font-size: 0.85em; /* Slightly smaller to fit side-by-side well */
    line-height: 1.4;
  }
  .shift-header {
    font-weight: bold;
    font-size: 1.05em;
    border-bottom: 1px solid #c8cbcf;
    padding-bottom: 6px;
    margin-bottom: 6px;
    color: #212529;
  }
  .wards-text {
    color: #495057;
  }

  .lookup-section { margin-top: 35px; } 

  .form-group { margin-bottom: 20px; }
  label { display: block; margin-bottom: 8px; font-weight: bold; }
  select, input, button { 
    width: 100%; 
    padding: 12px; 
    box-sizing: border-box; 
    font-size: 16px; 
    border: 1px solid #ccc;
    border-radius: 6px;
  }
  .main-btn { 
    background-color: #0056b3; 
    color: white; 
    border: none; 
    font-weight: bold;
    cursor: pointer; 
    margin-top: 10px; 
  }
  .main-btn:hover { background-color: #004494; }
  #result { 
    margin-top: 25px; 
    padding: 15px; 
    border-radius: 6px; 
    display: none; 
  }
  .yes { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
  .no { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
  .details { margin-top: 10px; font-size: 0.9em; font-weight: normal; line-height: 1.4;}
  .wards-list { margin-top: 8px; padding-top: 8px; border-top: 1px dashed currentColor; }
  
  .copy-btn {
    background-color: transparent;
    border: 1px solid currentColor;
    color: inherit;
    margin-top: 15px;
    padding: 8px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
  }
  .copy-btn:hover { opacity: 0.8; }

  footer {
    text-align: center;
    margin-top: 40px;
    font-size: 0.8em;
    color: #6c757d;
  }
  footer a {
    color: #0056b3;
    text-decoration: none;
  }
  footer a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="content">
  <div id="date-display"></div>

  <h2>Who's carrying the arrest bleep?</h2>
  <div id="todays-bleeps-container"></div>
  
  <div class="lookup-section">
    <h3>Lookup Arrest Bleep Status</h3>

    <div class="form-group">
      <label for="shift">Select Shift:</label>
      <select id="shift">
        <option value="LD1">LD1 (Day - Bleep 493)</option>
        <option value="N1">N1 (Night - Bleep 493)</option>
        <option value="LD2">LD2 (Day - Bleep 498)</option>
        <option value="N2">N2 (Night - Bleep 498)</option>
        <option value="LD3">LD3 (Day - Bleep 489)</option>
        <option value="N3">N3 (Night - Bleep 489)</option>
        <option value="LD4">LD4 (Day - Bleep 491)</option>
        <option value="N4">N4 (Night - Bleep 491)</option>
        <option value="LD5">LD5 (Day - Bleep 364)</option>
        <option value="N5">N5 (Night - Bleep 364)</option>
        <option value="LD6">LD6 (Day - Bleep 880)</option>
        <option value="N6">N6 (Night - Bleep 880)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="date">Select Date:</label>
      <input type="date" id="date">
    </div>

    <button class="main-btn" onclick="checkBleep()">Check Bleep Status</button>

    <div id="result"></div>
  </div>
</div>

<footer>
  Made by <a href="https://github.com/gpobyrne" target="_blank" rel="noopener noreferrer">GP O'Byrne</a>
</footer>

<script>
  const bleepData = {
    "LD1": { "bleep": "493", "days": ["Monday", "Wednesday"], "wards": ["SSSU (GEMU)", "8B", "8C", "8D", "PAEDS", "HDU", "ICU"] },
    "N1":  { "bleep": "493", "days": ["Monday", "Wednesday"], "wards": ["SSSU (GEMU)", "8B", "8C", "8D", "PAEDS", "HDU", "ICU"] },
    "LD2": { "bleep": "498", "days": ["Tuesday", "Thursday", "Saturday"], "wards": ["Thomond", "1C", "2C", "3C", "4C", "CF"] },
    "N2":  { "bleep": "498", "days": ["Tuesday", "Thursday", "Saturday"], "wards": ["Thomond", "1C", "2C", "3C", "4C", "CF"] },
    "LD3": { "bleep": "489", "days": ["Monday", "Friday"], "wards": ["3A", "4A", "3B", "4B", "5B", "2B", "7B"] },
    "N3":  { "bleep": "489", "days": ["Monday", "Friday"], "wards": ["3A", "4A", "3B", "4B", "5B", "2B", "7B"] },
    "LD4": { "bleep": "491", "days": ["Tuesday", "Thursday", "Saturday"], "wards": ["1D", "2D", "3D", "AMU", "7A", "7B", "1B"] },
    "N4":  { "bleep": "491", "days": ["Tuesday", "Thursday", "Saturday"], "wards": ["1D", "2D", "3D", "AMU", "7A", "7B", "1B"] },
    "LD5": { "bleep": "364", "days": ["Wednesday", "Friday", "Sunday"], "wards": ["1B", "6B", "12A", "12B", "Dialysis", "SAU", "Surgical Day ward", "VW"] },
    "N5":  { "bleep": "364", "days": ["Wednesday", "Friday", "Sunday"], "wards": ["1B", "6B", "12A", "12B", "Dialysis", "SAU", "Surgical Day ward", "VW"] },
    "LD6": { "bleep": "880", "days": ["Sunday"], "wards": ["9C", "9D", "9E", "9F", "CCU", "Cardiac Day Ward"] },
    "N6":  { "bleep": "880", "days": ["Sunday"], "wards": ["9C", "9D", "9E", "9F", "CCU", "Cardiac Day Ward"] }
  };

  const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

  window.onload = function() {
    const todayObj = new Date();
    document.getElementById('date').valueAsDate = todayObj;
    displayTodaysBleeps(todayObj);
  };
  
  function displayTodaysBleeps(dateObj) {
    const todayName = dayNames[dateObj.getDay()];
    const dateString = dateObj.toLocaleDateString('en-IE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    
    // Inject Date as H3 at the top
    document.getElementById('date-display').innerHTML = `<h3>🗓️ ${dateString}</h3>`;

    let activeBleeps = {};

    // Group active bleeps into day and night columns
    for (const [shift, data] of Object.entries(bleepData)) {
      if (data.days.includes(todayName)) {
        if (!activeBleeps[data.bleep]) {
          activeBleeps[data.bleep] = { day: null, night: null };
        }
        
        // Assume 'LD' shifts are day, 'N' shifts are night
        const shiftType = shift.startsWith('LD') ? 'day' : 'night';
        
        activeBleeps[data.bleep][shiftType] = {
          name: shift,
          wards: data.wards.join(', ')
        };
      }
    }

    let containerHTML = '';
    
    // Build the flex columns
    for (const [bleep, info] of Object.entries(activeBleeps)) {
      const dayShiftHtml = info.day 
        ? `<div class="shift-header">${info.day.name} (Bleep ${bleep})</div><div class="wards-text"><strong>Wards:</strong> ${info.day.wards}</div>` 
        : `<div class="shift-header">Day Shift</div><div class="wards-text">N/A</div>`;
        
      const nightShiftHtml = info.night 
        ? `<div class="shift-header">${info.night.name} (Bleep ${bleep})</div><div class="wards-text"><strong>Wards:</strong> ${info.night.wards}</div>` 
        : `<div class="shift-header">Night Shift</div><div class="wards-text">N/A</div>`;

      containerHTML += `
        <div class="bleep-row">
          <div class="shift-col">
            ${dayShiftHtml}
          </div>
          <div class="shift-col">
            ${nightShiftHtml}
          </div>
        </div>
      `;
    }
    
    document.getElementById('todays-bleeps-container').innerHTML = containerHTML;
  }

  let currentCopyText = "";

  function checkBleep() {
    const shift = document.getElementById('shift').value;
    const dateInput = document.getElementById('date').value;
    const resultDiv = document.getElementById('result');

    if (!dateInput) {
      alert("Please select a date.");
      return;
    }

    const dateObj = new Date(dateInput);
    const selectedDay = dayNames[dateObj.getDay()];

    const shiftData = bleepData[shift];
    const isCarrying = shiftData.days.includes(selectedDay);
    const routineDays = shiftData.days.join(', ');
    const wardsList = shiftData.wards.join(', ');
    const bleepNum = shiftData.bleep;

    currentCopyText = `Shift: ${shift} | Arrest Bleep: ${isCarrying ? 'YES' : 'NO'} (${bleepNum}) | Wards: ${wardsList}`;

    resultDiv.style.display = 'block';
    resultDiv.className = isCarrying ? 'yes' : 'no';

    const statusText = isCarrying 
        ? `<strong>YES.</strong> ${shift} carries the arrest bleep on ${selectedDay}s.` 
        : `<strong>NO.</strong> ${shift} does not carry the arrest bleep on ${selectedDay}s.`;

    resultDiv.innerHTML = `${statusText}
                           <div class="details">Routine cardiac days: ${routineDays}</div>
                           <div class="details wards-list"><strong>Wards Covered:</strong> ${wardsList}</div>
                           <button class="copy-btn" onclick="copyToClipboard(this)">Copy for Handover</button>`;
  }

  function copyToClipboard(btnElement) {
    navigator.clipboard.writeText(currentCopyText).then(() => {
      const originalText = btnElement.innerText;
      btnElement.innerText = "Copied!";
      setTimeout(() => {
        btnElement.innerText = originalText;
      }, 2000);
    }).catch(err => {
      alert("Failed to copy text. Your browser might not support this feature.");
    });
  }
</script>

</body>
</html>
