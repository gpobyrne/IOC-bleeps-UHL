<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UHL IOC Check Arrest Bleep Status</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="mobile-web-app-capable" content="yes">

<style>
  /* Global box-sizing fix prevents width overflow on mobile */
  *, *::before, *::after {
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 20px;
    max-width: 400px;
    margin: auto;
    background-color: #f8f9fa;
    color: #333;
    display: flex;
    flex-direction: column;
    min-height: 90vh;
  }
  .content { flex: 1; }
  
  .top-header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  h1 { margin: 0; font-size: 1.35em;}
  h2 { margin-bottom: 15px; font-size: 1.3em;}
  h3 { margin-bottom: 15px; margin-top: 0; }

  /* Change Date Link Styling */
  .date-picker-wrapper {
    position: relative;
    display: inline-flex;
    align-items: center;
    cursor: pointer;
  }
  .change-date-link {
    color: #0056b3;
    font-size: 0.9em;
    text-decoration: none;
    font-weight: normal;
  }
  .change-date-link:hover {
    text-decoration: underline;
  }
  .hidden-date-input {
    position: absolute;
    width: 0;
    height: 0;
    opacity: 0;
    border: none;
    padding: 0;
    z-index: -1;
  }

  /* Flex Layout for Rows */
  .bleep-row {
    display: flex;
    gap: 10px;
  }
  .shift-col {
    flex: 1;
    border-radius: 6px;
    padding: 10px;
    font-size: 0.85em;
    line-height: 1.4;
    border: 1px solid rgba(0,0,0,0.1);
  }
  
  /* Day/Night Theming */
  .day-box {
    background-color: rgba(0, 123, 255, 0.08);
    color: #212529;
  }
  .day-box .shift-header {
    border-bottom: 1px solid rgba(0, 123, 255, 0.2);
    color: #004494;
  }
  
  .night-box {
    background-color: rgba(10, 30, 65, 0.9);
    color: #f8f9fa;
  }
  .night-box .shift-header {
    border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    color: #ffffff;
  }
  .night-box .wards-text {
    color: #d0d5db;
  }

  .shift-header {
    font-weight: bold;
    font-size: 1.05em;
    padding-bottom: 6px;
    margin-bottom: 6px;
  }
  
  /* Separator Lines */
  .separator {
    margin: 15px 0;
    border-top: 2px dashed #b0b5ba;
  }

  .separator2 {
   margin: 15px 0;
   border-bottom: 2px solid #b0b5ba;
  }

  .lookup-section { margin-top: 35px; } 

  .form-group { margin-bottom: 20px; }
  label { display: block; margin-bottom: 8px; font-weight: bold; }
  select, input:not(.hidden-date-input), button:not(.change-date-link) { 
    width: 100%; 
    padding: 12px; 
    font-size: 16px; 
    border: 1px solid #ccc;
    border-radius: 6px;
  }
  .main-btn { 
    background-color: #0056b3; 
    color: white; 
    border: none; 
    font-weight: bold;
    cursor: pointer; 
    margin-top: 10px; 
  }
  .main-btn:hover { background-color: #004494; }
  #result { 
    margin-top: 25px; 
    padding: 15px; 
    border-radius: 6px; 
    display: none; 
  }
  .yes { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
  .no { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
  .wards-list { margin-top: 8px; padding-top: 8px; border-bottom: 1px dashed currentColor; }
  .details { margin-top: 10px; font-size: 0.9em; font-weight: normal; line-height: 1.4;}
  
  .copy-btn {
    background-color: transparent;
    border: 1px solid currentColor;
    color: inherit;
    margin-top: 15px;
    padding: 8px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
  }
  .copy-btn:hover { opacity: 0.8; }

  footer {
    text-align: center;
    margin-top: 40px;
    font-size: 0.8em;
    color: #6c757d;
  }
  footer a {
    color: #0056b3;
    text-decoration: none;
  }
  footer a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="content">
  <div class="top-header-row">
    <h1>🗓️ <span id="top-date-text"></span></h1>
    <div class="date-picker-wrapper" onclick="triggerTopDatePicker()">
      <span class="change-date-link">change date</span>
      <input type="date" id="top-date-picker" class="hidden-date-input" onchange="handleTopDateChange()">
    </div>
  </div>
  
  <h3>Interns carrying arrest bleep <span id="dynamic-today-text">today</span>:</h3>

  <div id="todays-bleeps-container"></div>
  
  <div class="lookup-section">
    <h3>Check an upcoming shift:</h3>

    <div class="form-group">
      <label for="shift">Select Shift:</label>
      <select id="shift">
        <option value="LD1">LD1 (Day - Bleep 493)</option>
        <option value="N1">N1 (Night - Bleep 493)</option>
        <option value="LD2">LD2 (Day - Bleep 498)</option>
        <option value="N2">N2 (Night - Bleep 498)</option>
        <option value="LD3">LD3 (Day - Bleep 489)</option>
        <option value="N3">N3 (Night - Bleep 489)</option>
        <option value="LD4">LD4 (Day - Bleep 491)</option>
        <option value="N4">N4 (Night - Bleep 491)</option>
        <option value="LD5">LD5 (Day - Bleep 364)</option>
        <option value="N5">N5 (Night - Bleep 364)</option>
        <option value="LD6">LD6 (Day - Bleep 880)</option>
        <option value="N6">N6 (Night - Bleep 880)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="date">Select Date:</label>
      <input type="date" id="date">
    </div>

    <button class="main-btn" onclick="checkBleep()">Check Arrest Bleep Status</button>

    <div id="result"></div>
  </div>
</div>

<footer>
  Made by <a href="https://github.com/gpobyrne" target="_blank" rel="noopener noreferrer">GP O'Byrne</a>
</footer>

<script>
  const bleepData = {
    "LD1": { "bleep": "493", "days": ["Monday", "Wednesday"], "wards": ["SSSU (GEMU)", "8B", "8C", "8D", "PAEDS", "HDU", "ICU"] },
    "N1":  { "bleep": "493", "days": ["Monday", "Wednesday"], "wards": ["SSSU (GEMU)", "8B", "8C", "8D", "PAEDS", "HDU", "ICU"] },
    "LD2": { "bleep": "498", "days": ["Tuesday", "Thursday", "Saturday"], "wards": ["Thomond", "1C", "2C", "3C", "4C", "CF"] },
    "N2":  { "bleep": "498", "days": ["Tuesday", "Thursday", "Saturday"], "wards": ["Thomond", "1C", "2C", "3C", "4C", "CF"] },
    "LD3": { "bleep": "489", "days": ["Monday", "Friday"], "wards": ["2B", "3A", "4A", "3B", "4B", "5B", "7B"] },
    "N3":  { "bleep": "489", "days": ["Monday", "Friday"], "wards": ["2B", "3A", "4A", "3B", "4B", "5B", "7B"] },
    "LD4": { "bleep": "491", "days": ["Tuesday", "Thursday", "Saturday"], "wards": ["AMU", "1D", "2D", "3D", "7A", "7B", "1B"] },
    "N4":  { "bleep": "491", "days": ["Tuesday", "Thursday", "Saturday"], "wards": ["AMU", "1D", "2D", "3D", "7A", "7B", "1B"] },
    "LD5": { "bleep": "364", "days": ["Wednesday", "Friday", "Sunday"], "wards": ["1B", "6B", "12A", "12B", "Dialysis", "SAU", "Surgical Day ward", "VW"] },
    "N5":  { "bleep": "364", "days": ["Wednesday", "Friday", "Sunday"], "wards": ["1B", "6B", "12A", "12B", "Dialysis", "SAU", "Surgical Day ward", "VW"] },
    "LD6": { "bleep": "880", "days": ["Sunday"], "wards": ["9C", "9D", "9E", "9F", "CCU", "Cardiac Day Ward"] },
    "N6":  { "bleep": "880", "days": ["Sunday"], "wards": ["9C", "9D", "9E", "9F", "CCU", "Cardiac Day Ward"] }
  };

  const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

  window.onload = function() {
    const todayObj = new Date();
    document.getElementById('date').valueAsDate = todayObj;
    document.getElementById('top-date-picker').valueAsDate = todayObj;
    displayTodaysBleeps(todayObj);
  };

  function triggerTopDatePicker() {
    const dateInput = document.getElementById('top-date-picker');
    try {
      if (typeof dateInput.showPicker === 'function') {
        dateInput.showPicker();
      } else {
        dateInput.focus();
      }
    } catch (e) {
      dateInput.focus();
    }
  }

  function handleTopDateChange() {
    const selectedDate = document.getElementById('top-date-picker').value;
    if(selectedDate) {
      displayTodaysBleeps(new Date(selectedDate));
    }
  }
  
  function displayTodaysBleeps(dateObj) {
    const dayName = dayNames[dateObj.getDay()];
    const dateString = dateObj.toLocaleDateString('en-IE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    
    // Update H1 Text
    document.getElementById('top-date-text').innerText = dateString;

    // Check if viewed date is actual today to update the grammar gracefully
    const actualToday = new Date();
    const isToday = dateObj.toDateString() === actualToday.toDateString();
    document.getElementById('dynamic-today-text').innerText = isToday ? "today" : "on this date";

    let dayShiftsHTML = '';
    let nightShiftsHTML = '';

    // Group active bleeps by Day (LD) vs Night (N)
    for (const [shift, data] of Object.entries(bleepData)) {
      if (data.days.includes(dayName)) {
        const isDayShift = shift.startsWith('LD');
        const boxClass = isDayShift ? 'day-box' : 'night-box';
        
        const boxHTML = `
          <div class="shift-col ${boxClass}">
            <div class="shift-header">${shift} (Bleep ${data.bleep})</div>
            <div class="wards-text"><strong>Wards:</strong> ${data.wards.join(', ')}</div>
          </div>
        `;
        
        if (isDayShift) {
          dayShiftsHTML += boxHTML;
        } else {
          nightShiftsHTML += boxHTML;
        }
      }
    }

    // Combine into final structure with separator
    const containerHTML = `
      <div class="bleep-row">${dayShiftsHTML}</div>
      <div class="separator"></div>
      <div class="bleep-row">${nightShiftsHTML}</div>
      <div class="separator2"></div>
    `;
    
    document.getElementById('todays-bleeps-container').innerHTML = containerHTML;
  }

  let currentCopyText = "";

  function checkBleep() {
    const shift = document.getElementById('shift').value;
    const dateInput = document.getElementById('date').value;
    const resultDiv = document.getElementById('result');

    if (!dateInput) {
      alert("Please select a date.");
      return;
    }

    const dateObj = new Date(dateInput);
    const selectedDay = dayNames[dateObj.getDay()];

    const shiftData = bleepData[shift];
    const isCarrying = shiftData.days.includes(selectedDay);
    const routineDays = shiftData.days.join(', ');
    const wardsList = shiftData.wards.join(', ');
    const bleepNum = shiftData.bleep;

    currentCopyText = `Shift: ${shift} | Arrest Bleep: ${isCarrying ? 'YES' : 'NO'} (${bleepNum}) | Wards: ${wardsList}`;

    resultDiv.style.display = 'block';
    resultDiv.className = isCarrying ? 'yes' : 'no';

    const statusText = isCarrying 
        ? `<strong>YES.</strong> ${shift} carries the arrest bleep on ${selectedDay}s.` 
        : `<strong>NO.</strong> ${shift} does not carry the arrest bleep on ${selectedDay}s.`;

    resultDiv.innerHTML = `${statusText}
                           <div class="details wards-list"><strong>Wards Covered:</strong> ${wardsList}</div>
                           <div class="details">Arrest bleep days: ${routineDays}</div>
                           <button class="copy-btn" onclick="copyToClipboard(this)">Copy to Clipboard</button>`;
  }

  function copyToClipboard(btnElement) {
    navigator.clipboard.writeText(currentCopyText).then(() => {
      const originalText = btnElement.innerText;
      btnElement.innerText = "Copied!";
      setTimeout(() => {
        btnElement.innerText = originalText;
      }, 2000);
    }).catch(err => {
      alert("Failed to copy text. Your browser might not support this feature.");
    });
  }
</script>

</body>
</html>
